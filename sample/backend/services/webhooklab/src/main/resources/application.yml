spring:
  application:
    name: webhooklab-service

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/webhook}
    username: ${DATABASE_USER:admin}
    password: ${DATABASE_PASSWORD:admin}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${PORT:4000}

api:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

logging:
  level:
    root: INFO
