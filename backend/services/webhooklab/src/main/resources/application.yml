spring:
  application:
    name: webhooklab-service

  profiles:
    active: ${PROFILE}

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${PORT}
  servlet:
    context-path: ""

auth:
  frontend-url: ${FRONTEND_URL}

logging:
  level:
    root: INFO
